<!DOCTYPE html>
<html>
<head>
  <title>MiniComp Lexer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>MiniComp — Lexical Analyzer</h1>

  <input id="expr" placeholder="Enter expression e.g. a + b * 2">
  
  <div>
    <button onclick="compileExpr()">Analyze</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <div class="panel">
    <h3>Tokens</h3>
    <h4 id="count"></h4>
    <pre id="tokens"></pre>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
